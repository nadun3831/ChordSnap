<script>
        // Micro-interactions for the processing screen
        const percentDisplay = document.getElementById('percent-display');
        const statusText = document.getElementById('status-text');
        const progressCircle = document.getElementById('progress-circle');

        const statuses = [
            "Extracting Harmonics...",
            "Syncing Beats...",
            "Mapping Voicings...",
            "Isolating Basslines...",
            "Generating Lead Sheets...",
            "Finalizing Transcription..."
        ];

        let progress = 85;
        const radius = progressCircle.r.baseVal.value;
        const circumference = 2 * Math.PI * 100; // Simplified for CSS dasharray usage context

        function updateProgress() {
            if (progress < 100) {
                progress += Math.random() * 0.5;
                if (progress > 100) progress = 100;
                
                percentDisplay.innerText = Math.floor(progress) + "%";
                
                // Update dashoffset
                // SVG dasharray/offset logic usually depends on total length
                const totalLength = 1000; // matching the attribute
                const offset = totalLength - (progress / 100 * totalLength);
                progressCircle.style.strokeDashoffset = offset;

                // Randomly change status text
                if (Math.random() > 0.98) {
                    const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
                    if(statusText.innerText !== randomStatus) {
                        statusText.style.opacity = 0;
                        setTimeout(() => {
                            statusText.innerText = randomStatus;
                            statusText.style.opacity = 1;
                        }, 200);
                    }
                }
            } else {
                statusText.innerText = "Processing Complete!";
                statusText.classList.add('text-primary');
            }
            requestAnimationFrame(updateProgress);
        }

        // Initial set
        progressCircle.style.transition = 'stroke-dashoffset 0.5s ease-out, opacity 0.5s ease';
        updateProgress();

        // Atmospheric Pulsing Logic via JS to keep it dynamic
        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const deltaX = (e.clientX - centerX) / 50;
            const deltaY = (e.clientY - centerY) / 50;
            
            document.querySelector('.ai-processing-gradient').style.backgroundPosition = `${50 + deltaX}% ${50 + deltaY}%`;
        });
    </script>
