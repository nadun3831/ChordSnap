<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .chord-pulse {
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 209, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(0, 209, 255, 0.3); }
        }

        .waveform-mask {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        /* Material Symbols Fill Support */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen font-body-md overflow-hidden selection:bg-primary/30">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-surface/50 backdrop-blur-xl border-b border-white/15 flex justify-between items-center px-container-margin h-16">

</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/20">

</div>
</header>
<main class="pt-16 pb-20 h-screen flex flex-col">
<!-- Top Section: Info & Waveform -->
<section class="px-container-margin pt-lg space-y-md shrink-0">
<div class="flex items-end justify-between">
<div class="space-y-1">
<h2 class="font-headline-md text-headline-md text-on-surface">Neon Horizon</h2>
<p class="font-body-md text-on-surface-variant">Synthwave Collective</p>
</div>
<div class="flex gap-4">
<button class="hover:bg-white/10 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" data-icon="favorite">favorite</span>
</button>
<button class="hover:bg-white/10 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="share">share</span>
</button>
</div>
</div>
<!-- Waveform Scrubber -->
<div class="relative h-24 glass-card rounded-xl overflow-hidden group cursor-pointer">
<div class="absolute inset-y-0 left-0 w-[42%] bg-primary/10 border-r border-primary z-10"></div>
<div class="absolute inset-0 waveform-mask flex items-center justify-around px-4 opacity-60">
<!-- Procedural Waveform UI -->
<div class="w-1 h-8 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-12 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-16 bg-primary rounded-full"></div>
<div class="w-1 h-10 bg-primary rounded-full"></div>

<div class="w-1 h-10 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-14 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-18 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-12 bg-on-surface-variant rounded-full"></div>
<div class="w-1 h-8 bg-on-surface-variant rounded-full"></div>

<div class="w-1 h-6 bg-on-surface-variant rounded-full"></div>

</div>
<div class="absolute bottom-2 right-4 font-label-sm text-label-sm text-on-surface-variant">01:42 / 03:54</div>
</div>
</section>
<!-- Middle Section: Chord Chart Scrolling Area -->
<section class="flex-1 overflow-hidden relative mt-lg">
<div class="absolute inset-x-0 top-0 h-16 bg-gradient-to-b from-background to-transparent z-10 pointer-events-none"></div>
<div class="h-full overflow-y-auto px-container-margin py-xl flex flex-col items-center gap-12 snap-y snap-mandatory scroll-smooth" id="chord-scroller">
<!-- Past Chord -->
<button class="flex flex-col items-center opacity-30 scale-75 transition-all duration-500 snap-center" onclick="editLabel(this)">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-2">01:30</span>
<span class="font-display-chord text-4xl text-on-surface-variant">Cmaj7</span>
</button>
<button class="flex flex-col items-center opacity-50 scale-90 transition-all duration-500 snap-center" onclick="editLabel(this)">

<span class="font-display-chord text-5xl text-on-surface-variant">F9</span>
</button>

<button class="mt-6 flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 hover:bg-white/20 transition-all text-label-sm font-label-sm uppercase tracking-widest text-on-surface-variant" onclick="editLabel(this)">
<span class="material-symbols-outlined text-[16px]" data-icon="edit">edit</span>
                            Edit Label
                        </button>
</div>

<div class="absolute inset-0 bg-primary/5 blur-[100px] -z-10 rounded-full"></div>
</div>

<span class="font-display-chord text-5xl text-on-surface-variant">Dm11</span>
</button>
<button class="flex flex-col items-center opacity-30 scale-75 transition-all duration-500 snap-center" onclick="editLabel(this)">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-2">01:54</span>
<span class="font-display-chord text-4xl text-on-surface-variant">G13</span>
</button>
<button class="flex flex-col items-center opacity-20 scale-50 transition-all duration-500 snap-center" onclick="editLabel(this)">

</button>

<span class="material-symbols-outlined text-[32px]" data-icon="shuffle">shuffle</span>
</button>
<div class="flex items-center gap-8">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[40px]" data-icon="skip_previous">skip_previous</span>
</button>
<button class="w-20 h-20 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(0,209,255,0.4)] active:scale-90 transition-all">
<span class="material-symbols-outlined text-[48px] filled-icon" data-icon="pause">pause</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[40px]" data-icon="skip_next">skip_next</span>
</button>
</div>
<button class="p-4 text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[32px]" data-icon="repeat">repeat</span>
</button>
</div>

<nav class="flex justify-around items-center h-20 pb-safe border-t border-white/10">

<!-- Overlay Micro-interactions -->
<script>
        function editLabel(el) {
            const currentText = el.querySelector('.font-display-chord').innerText;
            const newLabel = prompt("Edit chord label:", currentText);
            if (newLabel && newLabel.trim() !== "") {
                el.querySelector('.font-display-chord').innerText = newLabel.trim();
            }
        }

        // Add some atmospheric parallax scroll behavior
        const scroller = document.getElementById('chord-scroller');
        scroller.addEventListener('scroll', () => {
            const scrollPos = scroller.scrollTop;
            // Simple visual feedback for scroll
        });
    </script>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 -z-20 overflow-hidden pointer-events-none opacity-20">

</div>
